<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Wedding | Jesseca & Joshua</title>
</head>
<body>

  <!-- Background Music (hidden player) -->
  <audio id="bg-music" autoplay loop hidden>
    <source src="music/palagi.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <section id="video">
    <h2>A Glimpse of Us</h2>
    <div class="video-wrapper">
      <!-- Important: enablejsapi=1 so we can control playback -->
      <iframe id="wedding-video" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" frameborder="0" allowfullscreen></iframe>
    </div>
  </section>

  <script>
    // Autoplay fix: start music after first click if blocked
    document.addEventListener("click", function() {
      var audio = document.getElementById("bg-music");
      if (audio.paused) {
        audio.play();
      }
    }, {once:true});

    // Load YouTube IFrame API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // When API is ready, attach player
    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('wedding-video', {
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    }

    // Pause/resume background music depending on video state
    function onPlayerStateChange(event) {
      var audio = document.getElementById("bg-music");
      if (event.data == YT.PlayerState.PLAYING) {
        audio.pause();
      } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
        audio.play();
      }
    }
  </script>
</body>
</html>
